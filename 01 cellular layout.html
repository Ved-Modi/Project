<!DOCTYPE html>
<html lang="en">
<head>

<title>Lean Cellular Layout Diagram</title>
<style>
  body { font-family: Arial, sans-serif; background: #f8fafc; display: flex; flex-direction: column; align-items: center; padding: 2rem; }

<body>

  <rect x="447" y="112" width="72" height="50" rx="4" fill="#1A6B3A" stroke="#0F3D1F" stroke-width="1"/>

  <text x="790" y="299" text-anchor="middle" font-size="9" fill="#64748B" font-family="Arial">(5 multi-skilled ops.)</text>

  <rect x="130" y="340" width="700" height="80" rx="6" fill="#FFF7ED" stroke="#F0A500" stroke-width="2" stroke-dasharray="5,3"/>

  <path d="M170 300 L170 340" stroke="#1C4E80" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr)"/>

  <path d="M790 300 L790 340" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr)"/>

  <rect x="52" y="586" width="14" height="10" rx="2" fill="#1C4E80"/>
  <text x="70" y="595" font-size="10" fill="#1E293B" font-family="Arial">Cell 1 — Rotational</text>
  <rect x="160" y="586" width="14" height="10" rx="2" fill="#1A6B3A"/>
  <text x="178" y="595" font-size="10" fill="#1E293B" font-family="Arial">Cell 2 — Prismatic</text>
  <rect x="52" y="603" width="14" height="10" rx="2" fill="#7C3AED"/>
  <text x="70" y="612" font-size="10" fill="#1E293B" font-family="Arial">Cell 3 — Assembly</text>
